<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>App Authentication · Gor://a</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* --- GORILLA FONT --- */
    @font-face {
      font-family: 'din-next-w01-light';
      font-style: normal;
      font-weight: 400;
      src: url('//static.parastorage.com/fonts/v2/eca8b0cd-45d8-43cf-aee7-ca462bc5497c/v1/din-next-w02-light.woff2') format('woff2');
      font-display: swap;
    }

    :root {
      --bg-dark: #050505;
      --bg-panel: #0b1020;
      --primary: #3b6cff;
      --primary-hover: #2656e8;
      --text-main: #ffffff;
      --text-muted: #9ca3af;
      --border: #1f2937;
    }

    * {
      box-sizing: border-box;
      font-family: 'din-next-w01-light', system-ui, -apple-system, sans-serif;
    }

    body {
      margin: 0; padding: 0;
      background: var(--bg-dark);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 { font-size: 24px; margin: 0 0 10px; letter-spacing: -0.5px; }
    p.sub { color: var(--text-muted); font-size: 15px; line-height: 1.5; margin: 0 0 30px; }

    .btn {
      width: 100%; padding: 14px; border-radius: 8px; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 12px; transition: 0.2s;
    }

    .oauth-group { display: flex; flex-direction: column; gap: 12px; }
    
    .btn-google { background: white; color: black; }
    .btn-google:hover { background: #f3f4f6; }
    
    .btn-github { background: #24292e; color: white; border: 1px solid #374151; }
    .btn-github:hover { background: #1b1f23; }

    /* Success Loader */
    .loader {
      border: 3px solid rgba(255,255,255,0.1); 
      border-top: 3px solid var(--primary);
      border-radius: 50%; width: 40px; height: 40px; 
      animation: spin 1s linear infinite; 
      margin: 0 auto 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="auth-card">
    {% if step == 'success' %}
      
      <div class="loader"></div>
      <h2>Securely Connected</h2>
      <p class="sub">Returning you to the application...</p>
      
      <script>
        const userData = {{ user_data | safe }};
        
        // Blast the data back to the parent WebContainer/Live App
        if (window.opener) {
            window.opener.postMessage({ type: 'GORILLA_AUTH_SUCCESS', payload: userData }, '*');
            
            // Close the popup window automatically
            setTimeout(() => window.close(), 500);
        } else {
            document.querySelector('.sub').innerText = "Authentication successful. You can close this window.";
        }
      </script>

    {% elif step == 'login' %}
      
      <h1>Sign In</h1>
      <p class="sub">Log in to continue using <strong>{{ project_name }}</strong></p>

      <div class="oauth-group">
        <button class="btn btn-google" onclick="window.location.href='/api/v1/app-auth/{{ auth_id }}/google'">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <button class="btn btn-github" onclick="window.location.href='/api/v1/app-auth/{{ auth_id }}/github'">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
          Continue with GitHub
        </button>
      </div>
      
    {% endif %}
  </div>

</body>
</html>
